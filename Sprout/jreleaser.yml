project:
  name: sprout
  description: Sprout CLI scaffolding tool
  links:
    homepage: https://github.com/AmineSidki/sprout-releases
  authors:
    - Amine Sidki
  license: MIT
  java:
    version: 17

# This is the critical fix: It tells JReleaser to look "up" for the .git folder
environment:
  properties:
    jreleaser.git.root.search: true

release:
  github:
    owner: AmineSidki
    name: sprout-releases
    overwrite: true

distributions:
  sprout:
    type: JLINK
    artifacts:
      - path: artifacts/sprout-linux-x86_64.tar.gz
        platform: linux-x86_64
      - path: artifacts/sprout-osx-x86_64.zip
        platform: osx-x86_64
      - path: artifacts/sprout-windows-x86_64.zip
        platform: windows-x86_64

packagers:
  brew:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: homebrew-sprout
  scoop:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: scoop-sprout
